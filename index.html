<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无人飞行器协会违规记录管理</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.status-normal{color:#198754;font-weight:bold}
.status-warning{color:#ffc107;font-weight:bold}
.status-dismiss{color:#dc3545;font-weight:bold}
</style>
</head>
<body>
<div class="container mt-4 mb-5">
<h1 class="text-center mb-4">📝 无人飞行器协会违规记录管理</h1>

<div class="card mb-3">
<div class="card-header">管理员登录</div>
<div class="card-body">
<input type="password" id="pwd" class="form-control w-50 d-inline" placeholder="输入密码">
<button class="btn btn-primary ms-2" onclick="login()">登录</button>
<button class="btn btn-outline-secondary ms-2" onclick="logout()">退出</button>
<div id="tip" class="mt-2 text-muted">未登录 — 仅可查看</div>
</div>
</div>

<div class="card mb-3">
<div class="card-body">
<button class="btn btn-sm btn-primary" id="addMember" disabled onclick="addMember()">添加成员</button>
<button class="btn btn-sm btn-danger ms-2" id="addViolation" disabled onclick="addViolation()">新增违规</button>
<button class="btn btn-sm btn-success ms-2" id="exportBtn" disabled onclick="exportData()">导出Excel</button>
</div>
</div>

<div class="card mb-3">
<div class="table-responsive">
<table class="table table-bordered">
<thead>
<tr>
<th>姓名</th>
<th>违规次数</th>
<th>状态</th>
<th>操作</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>
</div>

<div class="card">
<div class="card-header">违规记录</div>
<div class="table-responsive">
<table class="table table-sm">
<thead>
<tr>
<th>时间</th>
<th>姓名</th>
<th>原因</th>
<th>登记人</th>
<th>操作</th>
</tr>
</thead>
<tbody id="logs"></tbody>
</table>
</div>
</div>
</div>

<!-- 弹窗 -->
<div class="modal fade" id="mModal"><div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h5>添加成员</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body"><input class="form-control" id="mName" placeholder="姓名"></div>
<div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="saveMember()">确定</button></div>
</div></div></div>

<div class="modal fade" id="vModal"><div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h5>新增违规</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
<select class="form-select mb-2" id="vName"></select>
<input class="form-control mb-2" id="vReason" placeholder="违规原因">
<input class="form-control" id="vUser" placeholder="登记人">
</div>
<div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="saveViolation()">确定</button></div>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// ==============================================
// ✅ 在这里直接写成员和违规记录！！！
// ==============================================
let data = {
  members: [
    { name: "刘刚刚", count: 1 },
    { name: "陈品润", count: 0 },
    { name: "郝英杰", count: 0 },
    { name: "胡浩宇", count: 0 },
    { name: "黄语菲", count: 0 },
    { name: "王语霏", count: 0 },
    { name: "陈如意", count: 0 },
    { name: "徐艺榕", count: 0 },
    { name: "陈维", count: 0 },
    { name: "陈春雨", count: 0 },
    { name: "段煜杨", count: 0 },
    { name: "霍俊贤", count: 0 },
    { name: "唐巳珩", count: 0 },
    { name: "江逸飞", count: 0 },
    { name: "姜品旭", count: 0 },
    { name: "梁家俊", count: 0 },
    { name: "朱永庆", count: 0 },
    { name: "裴洲通", count: 0 },
    { name: "童雨晨", count: 0 },
    { name: "章韵瑶", count: 0 },
    { name: "张凯琦", count: 0 },
    { name: "李沐洹", count: 0 },
    { name: "汤陈", count: 0 },
    { name: "温济舟", count: 0 },
    { name: "张明炜", count: 0 },
    { name: "牛怡菲", count: 0 },
    { name: "唐珺琢", count: 0 },
    { name: "谢林贝", count: 0 },
    { name: "王玉博文", count: 0 },
    { name: "武志磊", count: 0 },
    { name: "曲锐杰", count: 0 },
    { name: "吴璐欣", count: 0 },
    { name: "刘育玮", count: 0 },
    { name: "董廓", count: 0 },
    { name: "李汪鹏", count: 0 },
    { name: "李洋", count: 0 },
    { name: "王源彬", count: 0 },
    { name: "费敉菲", count: 0 },
    { name: "佳格迪", count: 0 },
    { name: "沙拓兰", count: 0 },
  ],
  logs: [
    { name: "刘刚刚", time: "2026-04-08 22:00", reason: "试验网站可靠性", user: "刘刚刚" },
    //{ name: "李四", time: "2026-04-08 11:00", reason: "缺席", user: "社长" },
    //{ name: "王五", time: "2026-04-08 12:00", reason: "违规", user: "社长" }
  ]
};

const PASSWORD = "987321";
let admin = false;

render(); // 一打开就显示你写的内容

function login() {
  if (document.getElementById("pwd").value === PASSWORD) {
    admin = true;
    document.getElementById("tip").innerText = "已登录 — 管理员";
    document.getElementById("addMember").disabled = false;
    document.getElementById("addViolation").disabled = false;
    document.getElementById("exportBtn").disabled = false;
  } else alert("密码错误");
}

function logout() {
  admin = false;
  document.getElementById("tip").innerText = "未登录 — 仅查看";
  document.getElementById("addMember").disabled = true;
  document.getElementById("addViolation").disabled = true;
  document.getElementById("exportBtn").disabled = true;
}

function addMember() {
  document.getElementById("mName").value = "";
  new bootstrap.Modal(document.getElementById("mModal")).show();
}

function saveMember() {
  let name = document.getElementById("mName").value.trim();
  if (!name) return;
  if (data.members.some(x => x.name === name)) { alert("已存在"); return; }
  data.members.push({ name, count: 0 });
  render();
  bootstrap.Modal.getInstance(document.getElementById("mModal")).hide();
}

function addViolation() {
  let sel = document.getElementById("vName");
  sel.innerHTML = "";
  data.members.forEach(m => {
    let o = document.createElement("option");
    o.value = m.name;
    o.innerText = m.name;
    sel.appendChild(o);
  });
  new bootstrap.Modal(document.getElementById("vModal")).show();
}

function saveViolation() {
  let name = document.getElementById("vName").value;
  let reason = document.getElementById("vReason").value.trim();
  let user = document.getElementById("vUser").value.trim();
  if (!reason || !user) return;

  data.logs.push({
    name, time: new Date().toLocaleString(), reason, user
  });

  let m = data.members.find(x => x.name === name);
  if (m) m.count++;

  render();
  bootstrap.Modal.getInstance(document.getElementById("vModal")).hide();
}

function delMember(name) {
  if (!admin) return;
  if (!confirm("确定删除？")) return;
  data.members = data.members.filter(x => x.name !== name);
  data.logs = data.logs.filter(x => x.name !== name);
  render();
}

function delLog(i) {
  if (!admin) return;
  let log = data.logs[i];
  let m = data.members.find(x => x.name === log.name);
  if (m) m.count = Math.max(0, m.count - 1);
  data.logs.splice(i, 1);
  render();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  data.members.forEach(m => {
    let status = m.count >= 5 ? "dismiss" : m.count >= 4 ? "warning" : "normal";
    let text = status == "dismiss" ? "待劝退" : status == "warning" ? "警告" : "正常";
    let btn = admin
      ? `<button class="btn btn-sm btn-danger" onclick="delMember('${m.name}')">删除</button>`
      : "无权限";

    list.innerHTML += `
    <tr>
      <td>${m.name}</td>
      <td>${m.count}</td>
      <td><span class="status-${status}">${text}</span></td>
      <td>${btn}</td>
    </tr>`;
  });

  let logsBox = document.getElementById("logs");
  logsBox.innerHTML = "";
  data.logs.forEach((log, i) => {
    let btn = admin ? `<button class="btn btn-sm btn-danger" onclick="delLog(${i})">删</button>` : "";
    logsBox.innerHTML += `
    <tr>
      <td>${log.time}</td>
      <td>${log.name}</td>
      <td>${log.reason}</td>
      <td>${log.user}</td>
      <td>${btn}</td></tr>`;
  });
}

function exportData() {
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data.members), "社员");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data.logs), "违规记录");
  XLSX.writeFile(wb, "社团违规记录.xlsx");
}
</script>
</body>
</html>
